name: anigraph pipeline

on:
  push:
    branches: [main]
    tags: ["2*-*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Run pipeline
        run: cargo run --release
        env:
          THETVDB_KEY: ${{ secrets.THETVDB_KEY }}
          TMDB_READ_KEY: ${{ secrets.TMDB_READ_KEY }}

      - name: List output
        run: ls -lh data/anigraph-*.jsonl.zst data/checksums.txt data/manifest.json

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            data/anigraph-anime.jsonl.zst
            data/anigraph-manga.jsonl.zst
            data/checksums.txt
            data/manifest.json
