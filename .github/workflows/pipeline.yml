name: anigraph pipeline

on:
  schedule:
    # Weekly on Wednesday at 02:17 UTC (off-peak; minute 17 avoids :00 queue contention)
    - cron: "17 2 * * 3"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override release tag (default: current ISO year-week, e.g. 2026-29)"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute release tag
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then TAG="$(date -u +%G-%V)"; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          EXISTS=$(git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1 && echo true || echo false)
          echo "exists=$EXISTS" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Skip — tag already released
        if: steps.meta.outputs.exists == 'true'
        run: echo "Tag ${{ env.RELEASE_TAG }} already exists, nothing to do."

      - name: Build
        if: steps.meta.outputs.exists != 'true'
        run: cargo build --release

      - name: Run pipeline
        if: steps.meta.outputs.exists != 'true'
        run: cargo run --release
        env:
          THETVDB_KEY: ${{ secrets.THETVDB_KEY }}
          TMDB_READ_KEY: ${{ secrets.TMDB_READ_KEY }}

      - name: Create and push tag
        if: steps.meta.outputs.exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Upload to release
        if: steps.meta.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: "automated scheduled release - entries updated @$(date -u +%Y-%m-%d)"
          files: |
            data/anigraph-anime.jsonl.zst
            data/anigraph-manga.jsonl.zst
            data/checksums.txt
            data/manifest.json
